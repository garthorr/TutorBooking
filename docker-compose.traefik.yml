# Production with Traefik:
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Or set permanently in your shell:
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.traefik.yml
services:
  server:
    environment:
      - TRUST_PROXY=2   # Traefik → nginx → Express = 2 hops

  client:
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tutorbooking.rule=Host(`tutorbooking.home.tastymath.com`)"
      - "traefik.http.routers.tutorbooking.entrypoints=websecure"
      - "traefik.http.routers.tutorbooking.tls=true"
      # - "traefik.http.routers.tutorbooking.tls.certresolver=cloudflare"
      - "traefik.http.services.tutorbooking.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
