services:
  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tutor-booking-server
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      # Traefik/cloudflared → nginx → Express = 2 hops
      - TRUST_PROXY=2
    env_file:
      - ./server/.env
    volumes:
      - token-data:/app/data
    networks:
      - booking-network
    mem_limit: 400m
    mem_reservation: 300m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend (React + Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tutor-booking-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - booking-network
      # Whichever proxy you use must share a network with this container.
      # Traefik: uncomment 'traefik' here and in the networks section below.
      # Cloudflare Tunnel: add cloudflared to booking-network (see below).
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tutorbooking.rule=Host(`tutorbooking.home.tastymath.com`)"
      - "traefik.http.routers.tutorbooking.entrypoints=websecure"
      - "traefik.http.routers.tutorbooking.tls=true"
      # - "traefik.http.routers.tutorbooking.tls.certresolver=cloudflare"
      - "traefik.http.services.tutorbooking.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"
    mem_limit: 150m
    mem_reservation: 100m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ── Cloudflare Tunnel (future) ────────────────────────────────────────────
  # Uncomment to replace Traefik with a Cloudflare Tunnel. cloudflared runs
  # on booking-network so it can reach client:80 with no host port exposed.
  # Get your token from the Cloudflare Zero Trust dashboard.
  #
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: tutor-booking-cloudflared
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   networks:
  #     - booking-network
  #   depends_on:
  #     - client

networks:
  booking-network:
    driver: bridge
  traefik:
    external: true   # must match the network your Traefik instance is on

volumes:
  token-data:
