services:
  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tutor-booking-server
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - TRUST_PROXY=1
    env_file:
      - ./server/.env
    volumes:
      - token-data:/app/data
    networks:
      - booking-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend (React + Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tutor-booking-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - booking-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Reverse Proxy (Caddy) for production HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: tutor-booking-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 support
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - client
      - server
    networks:
      - booking-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  booking-network:
    driver: bridge

volumes:
  token-data:
  caddy-data:
  caddy-config:
