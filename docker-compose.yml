services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tutor-booking-server
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - TRUST_PROXY=1
    env_file:
      - ./server/.env
    volumes:
      - token-data:/app/data
    networks:
      - booking-network
    mem_limit: 400m
    mem_reservation: 300m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tutor-booking-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - booking-network
    mem_limit: 150m
    mem_reservation: 100m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  booking-network:
    driver: bridge

volumes:
  token-data:
