services:
  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tutor-booking-server
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      # Traefik → nginx → Express = 2 hops; trust both so rate limiting sees
      # the real client IP rather than the nginx container address.
      - TRUST_PROXY=2
    env_file:
      - ./server/.env
    volumes:
      - token-data:/app/data
    networks:
      - booking-network
    mem_limit: 400m
    mem_reservation: 300m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend (React + Nginx) — Traefik entry point
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tutor-booking-client
    restart: unless-stopped
    ports:
      # Bind to localhost only — Traefik or cloudflared proxies inbound traffic.
      # Change to "0.0.0.0:80:80" only if you need direct LAN access.
      - "127.0.0.1:8080:80"
    depends_on:
      - server
    networks:
      - booking-network
    labels:
      - "traefik.enable=true"
      # ── Router ────────────────────────────────────────────────────────────
      - "traefik.http.routers.tutorbooking.rule=Host(`tutorbooking.home.tastymath.com`)"
      - "traefik.http.routers.tutorbooking.entrypoints=websecure"
      - "traefik.http.routers.tutorbooking.tls=true"
      # If you use a cert resolver (e.g. Let's Encrypt via Cloudflare DNS):
      # - "traefik.http.routers.tutorbooking.tls.certresolver=cloudflare"
      # ── Service ───────────────────────────────────────────────────────────
      - "traefik.http.services.tutorbooking.loadbalancer.server.port=80"
      # Tell Traefik which network to use when this container is on multiple networks
      - "traefik.docker.network=traefik"
    mem_limit: 150m
    mem_reservation: 100m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  booking-network:
    driver: bridge

volumes:
  token-data:
