services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tutor-booking-server
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - TRUST_PROXY=2
    env_file:
      - ./server/.env
    volumes:
      - token-data:/app/data
    networks:
      - booking-network
    mem_limit: 400m
    mem_reservation: 300m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tutor-booking-client
    restart: unless-stopped
    ports:
      - "5500:80"
    depends_on:
      - server
    networks:
      - booking-network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # HTTPS router
      - "traefik.http.routers.tutorbooking.rule=Host(`tutorbooking.oracle.tastymath.com`)"
      - "traefik.http.routers.tutorbooking.entrypoints=websecure"
      - "traefik.http.routers.tutorbooking.tls=true"
      - "traefik.http.routers.tutorbooking.tls.certresolver=letsencrypt"
      - "traefik.http.services.tutorbooking.loadbalancer.server.port=80"
    mem_limit: 150m
    mem_reservation: 100m
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  booking-network:
    driver: bridge
  traefik:
    external: true

volumes:
  token-data:
