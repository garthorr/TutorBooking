# Local dev override — loaded automatically alongside docker-compose.yml.
# Before first use, create the stub network once:
#   docker network create traefik
#
# Access via SSH tunnel:
#   ssh -L 8080:localhost:8080 <oracle-user>@<oracle-ip>
#   then open http://localhost:8080
services:
  server:
    environment:
      - NODE_ENV=development
      - TRUST_PROXY=1

  client:
    ports:
      - "127.0.0.1:8080:80"
